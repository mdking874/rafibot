<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NKH E-SPORTS | Auto Ad Impression</title>
    
    <meta http-equiv="refresh" content="20">

    <style>
        body {
            background-color: #0a0a0a;
            color: #00ffcc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        .bot-container {
            border: 2px dashed #00ffcc;
            padding: 30px;
            border-radius: 15px;
            background: rgba(0, 255, 204, 0.05);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
            width: 80%;
            max-width: 400px;
        }
        h1 { font-size: 22px; text-transform: uppercase; letter-spacing: 2px; }
        .status { color: #ffcc00; font-weight: bold; margin: 15px 0; }
        .timer { font-size: 12px; color: #888; }
        
        /* লোডিং এনিমেশন */
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #00ffcc;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 15px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <script src='//libtl.com/sdk.js' data-zone='10699784' data-sdk='show_10699784'></script>
</head>
<body>

    <div class="bot-container">
        <h1>NKH E-SPORTS</h1>
        <div class="spinner"></div>
        <p class="status" id="status-text">অ্যাড খোঁজা হচ্ছে...</p>
        <p id="counter" class="timer">পরবর্তী অ্যাড ২০ সেকেন্ড পর...</p>
        <hr style="border: 0.5px solid #333; margin: 20px 0;">
        <p style="font-size: 10px; color: #555;">Smart Auto-Page System v2.0</p>
    </div>

    <script>
        // হিউম্যান বিহেভিয়ার সিমুলেশন (অটো স্ক্রলিং)
        window.onload = function() {
            document.getElementById('status-text').innerText = "অ্যাড লোড হয়েছে! ইমপ্রেশন চলছে...";
            
            // ৫ সেকেন্ড পর একটু নিচে স্ক্রল করবে যাতে মনিট্যাগ মনে করে আসল মানুষ দেখছে
            setTimeout(() => {
                window.scrollBy({ top: 300, behavior: 'smooth' });
            }, 5000);

            // ১০ সেকেন্ড পর আবার উপরে যাবে
            setTimeout(() => {
                window.scrollBy({ top: -300, behavior: 'smooth' });
            }, 12000);
        };

        // টাইমার কাউন্টডাউন
        let seconds = 20;
        const counterEl = document.getElementById('counter');
        const interval = setInterval(() => {
            seconds--;
            counterEl.innerText = `পরবর্তী অ্যাড ${seconds} সেকেন্ড পর...`;
            if (seconds <= 0) clearInterval(interval);
        }, 1000);
    </script>

</body>
</html>
