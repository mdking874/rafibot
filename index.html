<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NKH E-SPORTS | Live Monitor</title>
    
    <script src='//libtl.com/sdk.js' data-zone='10699784' data-sdk='show_10699784'></script>

    <style>
        body { background: #111; color: #fff; font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        .monitor-box { border: 2px solid #00ff00; padding: 20px; margin: 20px auto; width: 80%; max-width: 300px; border-radius: 10px; }
        #view-count { font-size: 30px; color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>

    <div class="monitor-box">
        <h3>NKH E-SPORTS Status</h3>
        <p>মোট ভিউ হয়েছে:</p>
        <div id="view-count">Loading...</div>
    </div>

    <script>
        // লাইভ ট্র্যাকার (ফ্রি সার্ভিস)
        function updateCount() {
            fetch('https://api.countapi.xyz/hit/nkh-esports-data/visits')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('view-count').innerText = data.value;
                });
        }
        
        // প্রতি ৫ সেকেন্ড পর পর পেজ রিফ্রেশ হবে যাতে নতুন অ্যাড আসে এবং কাউন্টার বাড়ে
        updateCount();
        setTimeout(() => location.reload(), 20000); 
    </script>

</body>
</html>
